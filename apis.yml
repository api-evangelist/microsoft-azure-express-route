aid: microsoft-azure-express-route
name: Azure ExpressRoute
description: >-
  Azure ExpressRoute lets you create private connections between Azure
  datacenters and infrastructure on your premises or in a colocation
  environment. The REST API enables management of circuits, peering, route
  filters, and ExpressRoute Global Reach for cross-premises connectivity.
